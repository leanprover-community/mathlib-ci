name: Docgen test on nightly-testing

on:
  schedule:
    - cron: '37 1 * * *'  # Run at 01:37 UTC every day (generated by fair dice roll)
  workflow_dispatch:
    inputs:
      send_zulip:
        description: 'Send Zulip message'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build:
    name: build mathlib4-nightly-testing docs
    runs-on: doc-gen
    env:
      TARGET_REPO: leanprover-community/mathlib4-nightly-testing
      TARGET_PATH: nightly-testing
    steps:
      - name: Checkout mathlib
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: leanprover-community/mathlib4-nightly-testing
          ref: nightly-testing-green
          path: ${{ env.TARGET_PATH }}

      - name: Checkout mathlib-ci
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: ci-tools

      - name: Capture target SHA
        id: target
        run: echo "sha=$(git -C '${{ env.TARGET_PATH }}' rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Add upstream
        working-directory: ${{ env.TARGET_PATH }}
        run: |
          # Add the nightly-testing remote if it does not exist already, otherwise `lake exe cache` gets confused.
          (git remote | grep -q '^nightly-testing$') || git remote add nightly-testing https://github.com/leanprover-community/mathlib4-nightly-testing.git

      - name: Build and lint the project.
        id: build-lean
        uses: leanprover/lean-action@c544e89643240c6b398f14a431bcdc6309e36b3e # v1.4.0
        with:
          use-mathlib-cache: true
          lake-package-directory: ${{ env.TARGET_PATH }}

      # This is not quite the same as `docgen-action` does, since we do not actually want to upload the result.
      - name: create dummy docs project
        working-directory: ${{ env.TARGET_PATH }}
        run: |
          # Build HTML documentation for the project
          # The output will be located in docbuild/docs

          # Create a temporary docbuild folder
          mkdir -p docbuild

          # Template lakefile.toml
          cat << EOF > docbuild/lakefile.toml
          name = "docbuild"
          reservoir = false
          version = "0.1.0"
          packagesDir = "../.lake/packages"

          [[require]]
          name = "mathlib"
          path = "../"

          [[require]]
          scope = "leanprover"
          name = "doc-gen4"
          rev = "nightly-testing"
          EOF

          # Initialise docbuild as a Lean project
          cd docbuild

          # No need to reinstall packages if we can just copy them from Mathlib.
          mkdir -p .lake/packages
          cp -r ../.lake/packages/* .lake/packages
          cp ../lean-toolchain . # Use Mathlib's (nightly) toolchain.

          # Disable an error message due to a non-blocking bug. See Zulip
          MATHLIB_NO_CACHE_ON_UPDATE=1 lake update "$NAME"

          # Copy references.bib over while doc-gen lacks support for subproject references.bib
          mkdir docs/
          cp ../docs/references.bib docs/references.bib

      - name: Generate a temporary file to capture command output
        id: buildlog
        working-directory: ${{ env.TARGET_PATH }}/docbuild
        run: |
          echo -n "filename=" >> "${GITHUB_OUTPUT}"
          mktemp >> "${GITHUB_OUTPUT}"

      - name: build doc-gen4
        working-directory: ${{ env.TARGET_PATH }}/docbuild
        run: |
          env DISABLE_EQUATIONS=1 lake build doc-gen4 | tee -a "${{ steps.buildlog.outputs.filename }}"

      - name: build import graph
        working-directory: ${{ env.TARGET_PATH }}
        run: |
          lake exe graph mathlib.html | tee -a "${{ steps.buildlog.outputs.filename }}"

      - name: generate docs
        working-directory: ${{ env.TARGET_PATH }}/docbuild
        run: |
          lake build Batteries:docs Qq:docs Aesop:docs ProofWidgets:docs Mathlib:docs Archive:docs Counterexamples:docs docs:docs | tee -a "${{ steps.buildlog.outputs.filename }}"
          lake build Mathlib:docsHeader | tee -a "${{ steps.buildlog.outputs.filename }}"

      - name: clean up
        if: always()
        run: |
          rm -rf "${{ env.TARGET_PATH }}/docbuild"
          rm -rf "$HOME/.elan"
          rm -rf "$HOME/.cache/mathlib"

      - name: Prepare Zulip report
        id: zulip-report
        if: always()
        run: |
          # Process output for posting to Zulip
          WORKFLOW="${{ github.workflow }}" \
          TARGET_SHA="${{ steps.target.outputs.sha }}" \
          TARGET_REPO="${{ env.TARGET_REPO }}" \
          WORKFLOW_REPO="${{ github.repository }}" \
          WORKFLOW_RUN_ID="${{ github.run_id }}" \
          SUCCESS="${{ job.status == 'success' }}" \
            ./ci-tools/scripts/reporting/zulip_build_report.sh "${{ steps.buildlog.outputs.filename }}" >> "${GITHUB_OUTPUT}"

      - name: Send message on Zulip
        if: always() && steps.zulip-report.outcome == 'success' && (github.event_name != 'workflow_dispatch' || inputs.send_zulip)
        uses: zulip/github-actions-zulip/send-message@e4c8f27c732ba9bd98ac6be0583096dea82feea5 # v1.0.2
        with:
          api-key: ${{ secrets.ZULIP_MATHLIB_CI_BOT_API_KEY }}
          email: 'github-mathlib-ci-bot@leanprover.zulipchat.com'
          organization-url: 'https://leanprover.zulipchat.com'
          to: 'nightly-testing'
          type: 'stream'
          topic: 'Docgen status updates'
          content: ${{ steps.zulip-report.outputs.zulip-message }}
