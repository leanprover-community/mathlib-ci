name: nightly-testing regression report

on:
  schedule:
    - cron: '37 4 * * *'  # Run at 04:37 UTC every day (generated by fair dice roll)
  workflow_dispatch:
    inputs:
      send_zulip:
        description: 'Send Zulip message'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

env:
  TOP_MODULE: Mathlib
  TARGET_REPO: leanprover-community/mathlib4-nightly-testing
  TARGET_PATH: nightly-testing

jobs:
  grind-regressions:
    name: Build
    runs-on: pr
    steps:
    - name: Checkout mathlib-ci
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Checkout nightly-testing
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        repository: leanprover-community/mathlib4-nightly-testing
        ref: nightly-testing-green
        path: nightly-testing

    - name: Capture target SHA
      id: target
      working-directory: ${{ env.TARGET_PATH }}
      run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

    - name: Configure Lean
      uses: leanprover/lean-action@c544e89643240c6b398f14a431bcdc6309e36b3e # v1.4.0
      with:
        auto-config: false
        use-github-cache: false
        use-mathlib-cache: false
        reinstall-transient-toolchain: true
        lake-package-directory: nightly-testing

    - name: add nightly regression linter option
      working-directory: ${{ env.TARGET_PATH }}
      run: |
        # Reset contents of the lakefile, so we don't leave the wrong options enabled.
        git checkout HEAD -- lakefile.lean

        # we disable checking for backticks inside single quotes with the next line
        # shellcheck disable=SC2016
        # Enable the linter
        sed -i -- '/^  -- '\`'latest_import.yml'\`' uses this comment/{s=^=  ⟨`linter.nightlyRegressionSet, true⟩,\n=}' lakefile.lean

        # stage the changes in git so that `git diff` can confirm what changed
        git add -u
        git diff HEAD #lakefile.lean

        printf $'\n\nRunning a test %slake build` to verify, for instance, the absence of import loops\n' $'`'
        lake build Mathlib.Init

    - name: Add GitHub problem matcher wrapper
      uses: leanprover-community/gh-problem-matcher-wrap@20007cb926a46aa324653a387363b52f07709845 # 2025-04-23
      with:
        action: add
        linters: lean

    - name: Generate a temporary file to capture command output
      id: buildlog
      run: |
        echo -n "filename=" >> "${GITHUB_OUTPUT}"
        mktemp >> "${GITHUB_OUTPUT}"

    - name: build mathlib
      id: build
      continue-on-error: true
      working-directory: ${{ env.TARGET_PATH }}
      run: |
        lake build | tee -a "${{ steps.buildlog.outputs.filename }}"

    - name: Remove GitHub problem matcher wrapper
      uses: leanprover-community/gh-problem-matcher-wrap@20007cb926a46aa324653a387363b52f07709845 # 2025-04-23
      with:
        action: remove
        linters: lean

    - name: Prepare Zulip report
      id: zulip-report
      run: |
        WORKFLOW="${{ github.workflow }}" \
        TARGET_SHA="${{ steps.target.outputs.sha }}" \
        TARGET_REPO="${{ env.TARGET_REPO }}" \
        WORKFLOW_REPO="${{ github.repository }}" \
        WORKFLOW_RUN_ID="${{ github.run_id }}" \
        SUCCESS="${{ steps.build.outcome == 'success' }}" \
          ./scripts/reporting/zulip_build_report.sh "${{ steps.buildlog.outputs.filename }}" > "${GITHUB_OUTPUT}"

    - name: Post output to Zulip
      if: github.event_name != 'workflow_dispatch' || inputs.send_zulip
      uses: zulip/github-actions-zulip/send-message@e4c8f27c732ba9bd98ac6be0583096dea82feea5 # v1.0.2
      with:
        api-key: ${{ secrets.ZULIP_MATHLIB_CI_BOT_API_KEY }}
        email: 'github-mathlib-ci-bot@leanprover.zulipchat.com'
        organization-url: 'https://leanprover.zulipchat.com'
        to: 'nightly-testing'
        type: 'stream'
        topic: nightly-testing regression log
        content: ${{ steps.zulip-report.outputs.zulip-message }}
